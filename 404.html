<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada | Óptima Canales</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="public/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="site-config.js"></script>
  <style>
    :root {
      --blue-950: #071f3b;
      --blue-800: #10385f;
      --green-500: #7ed957;
      --lime-400: #c5e84a;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--white);
      background:
        linear-gradient(140deg, rgba(7, 31, 59, 0.98), rgba(16, 56, 95, 0.96)),
        var(--blue-950);
      font-family: "DM Sans", Arial, sans-serif;
      padding: 28px;
    }

    main {
      width: min(100%, 680px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 64px rgba(10, 38, 71, 0.22);
      padding: 34px;
      text-align: center;
    }

    img {
      width: 178px;
      height: auto;
      margin: 0 auto 26px;
    }

    p:first-of-type {
      color: var(--green-500);
      font-family: "Sora", Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      font-family: "Sora", Arial, sans-serif;
      font-size: 2.6rem;
      line-height: 1.08;
      margin: 10px 0 14px;
      letter-spacing: 0;
    }

    p {
      color: rgba(255, 255, 255, 0.74);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 26px;
      border-radius: 8px;
      color: var(--blue-950);
      background: linear-gradient(135deg, var(--lime-400), var(--green-500));
      font-family: "Sora", Arial, sans-serif;
      font-weight: 800;
      padding: 14px 22px;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="public/optima-logo-white.png" alt="Óptima" />
    <p>Error 404</p>
    <h1>Esta página no existe.</h1>
    <p>Puede que el enlace haya cambiado o que la dirección no esté bien escrita. Vuelve al inicio para solicitar una valoración o revisar la información para canales.</p>
    <a href="index.html">Volver al inicio</a>
  </main>
  <script>
    (() => {
      const config = window.OPTIMA_SITE || {};
      document.title = `Página no encontrada | ${config.commercialName || "Óptima Canales"}`;
    })();
  </script>
</body>
</html>
