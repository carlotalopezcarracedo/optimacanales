name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate SEO files
        run: node scripts/generate-seo.mjs
        env:
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Prepare static artifact
        shell: bash
        run: |
          mkdir -p _site
          cp .nojekyll 404.html aviso-legal.html cookies.html index.html legal.css privacidad.html robots.txt site-config.js site-legal.js sitemap.xml _site/
          cp -R public _site/public
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
